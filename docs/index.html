<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Momentum — gamified anti-procrastination tracker</title>
    <meta
      name="description"
      content="Momentum helps users turn tasks, habits, and routines into a calmer, more motivating progress system with daily reflection and visual progress tracking."
    >
    <meta name="robots" content="index, follow">
    <meta name="google-site-verification" content="GOOGLE_SEARCH_CONSOLE_VERIFICATION_CODE">
    <meta name="theme-color" content="#f4efe8">
    <link rel="canonical" href="https://bladestranger04.github.io/momentum/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Momentum">
    <meta property="og:title" content="Momentum — gamified anti-procrastination tracker">
    <meta
      property="og:description"
      content="Momentum helps users turn tasks, habits, and routines into a calmer, more motivating progress system with daily reflection and visual progress tracking."
    >
    <meta property="og:url" content="https://bladestranger04.github.io/momentum/">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Momentum — gamified anti-procrastination tracker">
    <meta
      name="twitter:description"
      content="Momentum helps users turn tasks, habits, and routines into a calmer, more motivating progress system with daily reflection and visual progress tracking."
    >
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Momentum",
        "applicationCategory": "ProductivityApplication",
        "operatingSystem": "Web",
        "description": "Momentum helps users turn tasks, habits, and routines into a calmer, more motivating progress system with daily reflection and visual progress tracking.",
        "url": "https://bladestranger04.github.io/momentum/"
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg?v=20260420-1">
    <link rel="stylesheet" href="assets/site.css?v=20260420-1">
  </head>
  <body>
    <div class="page-glow" aria-hidden="true"></div>
    <main class="app-shell">
      <header class="app-topbar panel">
        <div class="topbar-main">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">
              <span class="brand-mark__bar brand-mark__bar--one"></span>
              <span class="brand-mark__bar brand-mark__bar--two"></span>
              <span class="brand-mark__bar brand-mark__bar--three"></span>
              <span class="brand-mark__glow"></span>
            </span>
            <div class="brand-copy">
              <strong>Momentum</strong>
              <span id="brandViewLabel"></span>
            </div>
          </div>
        </div>
        <div class="segmented topbar-nav" id="viewToggle" aria-label="View"></div>
        <div class="topbar-controls">
          <button class="quiet-button" id="settingsButton" type="button"></button>
          <div class="segmented" id="languageToggle" aria-label="Language"></div>
          <label class="theme-field">
            <span class="visually-hidden" id="themeFieldLabel"></span>
            <select id="themeSelect"></select>
          </label>
        </div>
      </header>

      <section class="view-screen" id="todayView">
        <section class="today-rail">
          <section class="panel start-panel" id="startPanel">
            <div class="start-panel__head">
              <div class="start-panel__copy">
                <p class="section-kicker" id="startKicker"></p>
                <h1 id="startTitle"></h1>
              </div>
              <button class="quiet-button" id="loadDemoButton" type="button"></button>
            </div>

            <form class="quick-start" id="quickStartForm">
              <div class="quick-start__bar">
                <label class="quick-input">
                  <span class="visually-hidden" id="quickInputLabel"></span>
                  <input id="quickTrackTitle" name="quickTitle" maxlength="70" type="text">
                </label>
                <button class="button button--primary" id="quickCreateButton" type="submit"></button>
              </div>

              <div class="start-options">
                <section class="option-group">
                  <div class="option-group__head">
                    <span id="quickCategoryLabel"></span>
                  </div>
                  <div class="choice-row" id="quickCategoryRow"></div>
                </section>

                <section class="option-group option-group--ideas">
                  <div class="option-group__head">
                    <span id="quickSuggestionLabel"></span>
                  </div>
                  <div class="suggestion-row" id="quickSuggestionRow"></div>
                </section>
              </div>
            </form>
          </section>

          <section class="quote-row" id="quoteSection">
            <article class="panel quote-card">
              <div class="quote-card__head">
                <p class="section-kicker" id="quoteKicker"></p>
                <button class="quiet-button" id="hideQuoteButton" type="button"></button>
              </div>
              <blockquote class="quote-card__text" id="quoteText"></blockquote>
              <p class="quote-card__source" id="quoteSource"></p>
            </article>
          </section>
        </section>

        <section class="main-grid" id="workspaceGrid">
          <section class="panel board-panel">
            <div class="section-heading">
              <div>
                <p class="section-kicker" id="boardKicker"></p>
                <h2 id="boardTitle"></h2>
              </div>
              <button class="button button--secondary" id="newTrackButton" type="button"></button>
            </div>
            <div class="board-empty" id="boardEmpty">
              <h3 id="boardEmptyTitle"></h3>
              <p id="boardEmptyBody"></p>
            </div>
            <div class="tracks-grid" id="tracksGrid"></div>
          </section>

          <aside class="sidebar" id="sidebar">
            <section class="panel daily-panel">
              <div class="section-heading section-heading--tight">
                <div>
                  <p class="section-kicker" id="dailyKicker"></p>
                  <h2 id="dailyTitle"></h2>
                </div>
              </div>
              <div class="daily-brief" id="dailyBrief"></div>
              <div class="micro-list" id="dailyList"></div>
            </section>

            <section class="panel feed-panel" id="activityPanel">
              <div class="section-heading section-heading--tight">
                <div>
                  <p class="section-kicker" id="activityKicker"></p>
                  <h2 id="activityTitle"></h2>
                </div>
              </div>
              <div class="activity-feed" id="activityFeed"></div>
            </section>
          </aside>
        </section>
      </section>

      <section class="view-screen is-hidden" id="progressView">
        <section class="panel progress-empty" id="progressEmpty">
          <div class="section-heading section-heading--tight">
            <div>
              <p class="section-kicker" id="progressKicker"></p>
              <h2 id="progressTitle"></h2>
            </div>
          </div>
          <p class="empty-copy" id="progressEmptyBody"></p>
        </section>

        <section class="summary-row" id="summaryRow"></section>

        <section class="analytics-grid" id="analyticsGrid">
          <section class="panel chart-panel">
            <div class="section-heading section-heading--tight">
              <div>
                <p class="section-kicker" id="analyticsKickerOne"></p>
                <h2 id="weeklyChartTitle"></h2>
              </div>
            </div>
            <div id="weeklyWinsChart" class="chart-host"></div>
          </section>

          <section class="panel chart-panel">
            <div class="section-heading section-heading--tight">
              <div>
                <p class="section-kicker" id="analyticsKickerTwo"></p>
                <h2 id="momentumChartTitle"></h2>
              </div>
            </div>
            <div id="momentumChart" class="chart-host"></div>
          </section>

          <section class="panel chart-panel">
            <div class="section-heading section-heading--tight">
              <div>
                <p class="section-kicker" id="analyticsKickerThree"></p>
                <h2 id="heatmapChartTitle"></h2>
              </div>
            </div>
            <div id="heatmapChart" class="chart-host"></div>
          </section>
        </section>
      </section>
    </main>

    <dialog class="settings-dialog" id="settingsDialog">
      <form method="dialog" class="dialog-close-row">
        <button class="quiet-button" id="settingsCloseButton" type="submit" value="cancel"></button>
      </form>

      <section class="track-form settings-form">
        <div class="dialog-copy">
          <p class="section-kicker" id="toolsKicker"></p>
          <h2 id="toolsTitle"></h2>
        </div>

        <div class="settings-grid">
          <article class="tool-card settings-card settings-card--primary">
            <strong id="reflectionToolTitle"></strong>
            <p id="reflectionToolBody"></p>
            <label class="tool-select">
              <span id="quoteStyleLabel"></span>
              <select id="quoteStyleSelect"></select>
            </label>
            <button class="quiet-button" id="toggleQuoteButton" type="button"></button>
          </article>

          <article class="tool-card settings-card">
            <strong id="exportTitle"></strong>
            <p id="exportBody"></p>
            <button class="quiet-button" id="exportDataButton" type="button"></button>
          </article>

          <article class="tool-card settings-card">
            <strong id="importTitle"></strong>
            <p id="importBody"></p>
            <button class="quiet-button" id="importDataButton" type="button"></button>
          </article>

          <article class="tool-card settings-card">
            <strong id="resetTitle"></strong>
            <p id="resetBody"></p>
            <button class="quiet-button quiet-button--danger" id="resetDataButton" type="button"></button>
          </article>
        </div>
        <input class="visually-hidden" id="importFileInput" type="file" accept="application/json">
      </section>
    </dialog>

    <dialog class="track-dialog" id="trackDialog">
      <form method="dialog" class="dialog-close-row">
        <button class="quiet-button" id="dialogCloseButton" type="submit" value="cancel"></button>
      </form>

      <form class="track-form" id="trackForm">
        <input id="trackId" name="trackId" type="hidden">

        <div class="dialog-copy">
          <p class="section-kicker" id="dialogKicker"></p>
          <h2 id="dialogTitle"></h2>
          <p id="dialogBody"></p>
        </div>

        <label class="field">
          <span id="trackTitleLabel"></span>
          <input id="trackTitle" name="title" maxlength="70" required>
        </label>

        <div class="field-row">
          <label class="field">
            <span id="trackCategoryLabel"></span>
            <select id="trackCategory" name="category"></select>
          </label>

          <label class="field">
            <span id="targetValueLabel"></span>
            <input id="targetValue" name="targetValue" type="number" min="1" max="100" value="10" required>
          </label>

          <label class="field">
            <span id="unitLabelLabel"></span>
            <input id="unitLabel" name="unitLabel" maxlength="30" required>
          </label>
        </div>

        <fieldset class="mode-picker">
          <legend id="dialogModeLegend"></legend>

          <label class="mode-card">
            <input type="radio" name="mode" value="focus" checked>
            <strong id="dialogModeFocusLabel"></strong>
            <span id="dialogModeFocusNote"></span>
          </label>

          <label class="mode-card">
            <input type="radio" name="mode" value="momentum">
            <strong id="dialogModeMomentumLabel"></strong>
            <span id="dialogModeMomentumNote"></span>
          </label>

          <label class="mode-card">
            <input type="radio" name="mode" value="milestone">
            <strong id="dialogModeMilestoneLabel"></strong>
            <span id="dialogModeMilestoneNote"></span>
          </label>
        </fieldset>

        <p class="mode-note" id="modeNote"></p>

        <label class="field">
          <span id="trackWhyLabel"></span>
          <textarea id="trackWhy" name="why" rows="2" maxlength="140"></textarea>
        </label>

        <label class="field">
          <span id="stepListLabel"></span>
          <textarea id="stepList" name="steps" rows="5"></textarea>
        </label>

        <div class="suggestion-wrap">
          <div class="suggestion-wrap__head">
            <span id="dialogSuggestionLabel"></span>
            <button class="button-link" id="fillSuggestionsButton" type="button"></button>
          </div>
          <div class="suggestion-row" id="suggestionChips"></div>
        </div>

        <div class="dialog-actions">
          <button class="button button--ghost" id="cancelDialogButton" type="button"></button>
          <button class="button button--primary" id="saveTrackButton" type="submit"></button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="feedbackToast" aria-live="polite"></div>

    <script type="module" src="assets/app.js?v=20260420-1"></script>
  </body>
</html>
